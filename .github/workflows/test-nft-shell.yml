name: Test NFT shell compatibility

on:
  pull_request:
    paths:
      - "multiwan-nft/**"
      - "scripts/install-nft.sh"
      - "tests/test-nft-*.sh"
      - ".github/workflows/test-nft-shell.yml"
  push:
    branches: [main]
    paths:
      - "multiwan-nft/**"
      - "scripts/install-nft.sh"
      - "tests/test-nft-*.sh"
      - ".github/workflows/test-nft-shell.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  busybox-shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install shell runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y busybox-static dash

      - name: Check installed script syntax
        run: |
          files="
            multiwan-nft/files/etc/hotplug.d/iface/15-multiwan-nft
            multiwan-nft/files/etc/hotplug.d/iface/16-multiwan-nft-user
            multiwan-nft/files/etc/init.d/multiwan-nft
            multiwan-nft/files/etc/multiwan-nft.user
            multiwan-nft/files/etc/uci-defaults/10-multiwan-nft-migrate-config
            multiwan-nft/files/etc/uci-defaults/multiwan-nft-migrate-flush_conntrack
            multiwan-nft/files/lib/multiwan-nft/common.sh
            multiwan-nft/files/lib/multiwan-nft/multiwan_nft.sh
            multiwan-nft/files/lib/multiwan-nft/process-lock.sh
            multiwan-nft/files/usr/libexec/rpcd/multiwan_nft
            multiwan-nft/files/usr/sbin/multiwan-nft
            multiwan-nft/files/usr/sbin/multiwan-nft-rtmon
            multiwan-nft/files/usr/sbin/multiwan-nft-track
            scripts/install-nft.sh
          "
          for file in $files; do
            dash -n "$file"
            busybox ash -n "$file"
          done

      - name: Run NFT regression tests with BusyBox ash
        run: |
          busybox ash tests/test-nft-common.sh
          busybox ash tests/test-nft-process-lock.sh
          busybox ash tests/test-nft-rtmon.sh
          busybox ash tests/test-nft-tracker-owner.sh

      - name: Run NFT regression tests with dash
        run: |
          dash tests/test-nft-common.sh
          dash tests/test-nft-process-lock.sh
          dash tests/test-nft-rtmon.sh
          dash tests/test-nft-tracker-owner.sh
