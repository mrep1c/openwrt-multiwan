name: Build OpenWrt OPKG feed
run-name: OpenWrt opkg-24.10-noarch + opkg-23.05-noarch

on:
  workflow_run:
    workflows: ["Auto Bump Component Versions"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-24.04
    outputs:
      build: ${{ steps.decide.outputs.build }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Checkout package feed
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide whether to build feed
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          build=false
          reason="unsupported event"

          case "$EVENT_NAME" in
            workflow_dispatch)
              build=true
              reason="manual dispatch"
              ;;
            workflow_run)
              if [ "$WORKFLOW_RUN_CONCLUSION" != "success" ]; then
                reason="auto-bump workflow did not succeed"
              else
                changed_files="$(git diff --name-only HEAD^ HEAD)"
                feed_input_changed=false
                nft_changed=false
                nft_version_changed=false
                qos_changed=false
                qos_version_changed=false
                for path in $changed_files; do
                  [ -n "$path" ] || continue
                  case "$path" in
                    multiwan-nft/*|luci-app-multiwan-nft/*|multiwan-qos/*|luci-app-multiwan-qos/*|install.sh|VERSION|keys/*)
                      feed_input_changed=true
                      ;;
                  esac
                  case "$path" in
                    multiwan-nft/*|luci-app-multiwan-nft/*|install.sh)
                      nft_changed=true
                      ;;
                  esac
                  case "$path" in
                    multiwan-nft/Makefile|luci-app-multiwan-nft/Makefile)
                      nft_version_changed=true
                      ;;
                  esac
                  case "$path" in
                    multiwan-qos/*|luci-app-multiwan-qos/*|install.sh)
                      qos_changed=true
                      ;;
                  esac
                  case "$path" in
                    multiwan-qos/Makefile|luci-app-multiwan-qos/Makefile)
                      qos_version_changed=true
                      ;;
                  esac
                done

                subject="$(git log -1 --pretty=%s)"
                author_email="$(git log -1 --pretty=%ae)"
                if [ "$author_email" = "41898282+github-actions[bot]@users.noreply.github.com" ] &&
                   case "$subject" in "Bump NFT version to "*|"Bump QoS version to "*|"Bump package versions: "*) true ;; *) false ;; esac; then
                  build=true
                  reason="auto-bump produced a component version commit"
                elif [ "$feed_input_changed" != true ]; then
                  reason="auto-bump completed after a non-feed push"
                elif { [ "$nft_changed" = true ] && [ "$nft_version_changed" != true ]; } ||
                     { [ "$qos_changed" = true ] && [ "$qos_version_changed" != true ]; }; then
                  reason="changed component is still missing a version bump"
                else
                  build=true
                  reason="feed inputs already include their component version changes"
                fi
              fi
              ;;
          esac

          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "$reason"

  build:
    name: OpenWrt ${{ matrix.release_tag }}
    needs: preflight
    if: needs.preflight.outputs.build == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_release: "24.10.6"
            target: rockchip
            subtarget: armv8
            sdk_url: https://downloads.openwrt.org/releases/24.10.6/targets/rockchip/armv8/openwrt-sdk-24.10.6-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            release_tag: opkg-24.10-noarch
          - openwrt_release: "23.05.6"
            target: rockchip
            subtarget: armv8
            sdk_url: https://downloads.openwrt.org/releases/23.05.6/targets/rockchip/armv8/openwrt-sdk-23.05.6-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
            release_tag: opkg-23.05-noarch

    steps:
      - name: Checkout package feed
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            file \
            gawk \
            gettext \
            git \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            tar \
            unzip \
            wget \
            xz-utils \
            zlib1g-dev \
            zstd

      - name: Download OpenWrt SDK
        run: |
          mkdir -p "$RUNNER_TEMP/openwrt-sdk"
          wget -O "$RUNNER_TEMP/openwrt-sdk.tar" "${{ matrix.sdk_url }}"
          case "${{ matrix.sdk_url }}" in
            *.tar.zst) tar -I zstd -xf "$RUNNER_TEMP/openwrt-sdk.tar" -C "$RUNNER_TEMP/openwrt-sdk" --strip-components=1 ;;
            *.tar.xz) tar -Jxf "$RUNNER_TEMP/openwrt-sdk.tar" -C "$RUNNER_TEMP/openwrt-sdk" --strip-components=1 ;;
            *.tar.gz|*.tgz) tar -zxf "$RUNNER_TEMP/openwrt-sdk.tar" -C "$RUNNER_TEMP/openwrt-sdk" --strip-components=1 ;;
            *) tar -xf "$RUNNER_TEMP/openwrt-sdk.tar" -C "$RUNNER_TEMP/openwrt-sdk" --strip-components=1 ;;
          esac

      - name: Configure SDK feed
        run: |
          cd "$RUNNER_TEMP/openwrt-sdk"
          echo "src-link multiwan $GITHUB_WORKSPACE" >> feeds.conf.default
          for attempt in 1 2 3; do
            if ./scripts/feeds update -a; then
              break
            fi
            echo "OpenWrt feed update failed (attempt $attempt of 3)" >&2
            [ "$attempt" -lt 3 ] || exit 1
            rm -rf feeds/luci feeds/luci.index
            sleep $((attempt * 30))
          done
          ./scripts/feeds install -p multiwan multiwan-nft
          ./scripts/feeds install -p multiwan luci-app-multiwan-nft
          ./scripts/feeds install -p multiwan multiwan-qos
          ./scripts/feeds install -p multiwan luci-app-multiwan-qos
          make defconfig

      - name: Configure OPKG signing key
        env:
          OPENWRT_OPKG_PRIVATE_KEY: ${{ secrets.OPENWRT_OPKG_PRIVATE_KEY }}
        run: |
          cd "$RUNNER_TEMP/openwrt-sdk"
          if [ -z "$OPENWRT_OPKG_PRIVATE_KEY" ]; then
            echo "OPENWRT_OPKG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi

          printf '%s\n' "$OPENWRT_OPKG_PRIVATE_KEY" > key-build
          chmod 600 key-build

          usign="staging_dir/host/bin/usign"
          if [ ! -x "$usign" ]; then
            echo "Could not find SDK usign at $usign" >&2
            exit 1
          fi

          private_fp="$("$usign" -F -s key-build)"
          public_fp="$("$usign" -F -p "$GITHUB_WORKSPACE/keys/mrep1c-openwrt-multiwan-opkg.pub")"
          if [ "$private_fp" != "$public_fp" ]; then
            echo "OPKG private key does not match committed public key" >&2
            echo "private=$private_fp public=$public_fp" >&2
            exit 1
          fi

      - name: Build packages
        run: |
          cd "$RUNNER_TEMP/openwrt-sdk"
          make -j"$(nproc)" package/feeds/multiwan/multiwan-nft/compile V=s
          make -j"$(nproc)" package/feeds/multiwan/luci-app-multiwan-nft/compile V=s
          make -j"$(nproc)" package/feeds/multiwan/multiwan-qos/compile V=s
          make -j"$(nproc)" package/feeds/multiwan/luci-app-multiwan-qos/compile V=s
          make package/index V=s

      - name: Sign OPKG package index
        env:
          OPENWRT_OPKG_PRIVATE_KEY: ${{ secrets.OPENWRT_OPKG_PRIVATE_KEY }}
        run: |
          cd "$RUNNER_TEMP/openwrt-sdk"
          if [ -z "$OPENWRT_OPKG_PRIVATE_KEY" ]; then
            echo "OPENWRT_OPKG_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi

          feed_dir="$(find bin/packages -mindepth 2 -maxdepth 2 -type d -name multiwan | head -n 1)"
          if [ -z "$feed_dir" ]; then
            echo "Could not find generated bin/packages/*/multiwan directory" >&2
            find bin/packages -maxdepth 3 -type d >&2
            exit 1
          fi

          usign="staging_dir/host/bin/usign"
          if [ ! -x "$usign" ]; then
            echo "Could not find SDK usign at $usign" >&2
            exit 1
          fi

          private_fp="$("$usign" -F -s key-build)"
          public_fp="$("$usign" -F -p "$GITHUB_WORKSPACE/keys/mrep1c-openwrt-multiwan-opkg.pub")"
          if [ "$private_fp" != "$public_fp" ]; then
            echo "OPKG private key does not match committed public key" >&2
            echo "private=$private_fp public=$public_fp" >&2
            exit 1
          fi

          "$usign" -S -m "$feed_dir/Packages" -s key-build -x "$feed_dir/Packages.sig"
          test -s "$feed_dir/Packages.sig"

      - name: Collect OPKG feed assets
        run: |
          cd "$RUNNER_TEMP/openwrt-sdk"
          feed_dir="$(find bin/packages -mindepth 2 -maxdepth 2 -type d -name multiwan | head -n 1)"
          if [ -z "$feed_dir" ]; then
            echo "Could not find generated bin/packages/*/multiwan directory" >&2
            find bin/packages -maxdepth 3 -type d >&2
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$feed_dir"/*.ipk "$GITHUB_WORKSPACE/dist/"
          cp "$feed_dir"/Packages "$GITHUB_WORKSPACE/dist/"
          cp "$feed_dir"/Packages.gz "$GITHUB_WORKSPACE/dist/"
          [ -f "$feed_dir/Packages.manifest" ] && cp "$feed_dir"/Packages.manifest "$GITHUB_WORKSPACE/dist/" || true
          cp "$feed_dir"/Packages.sig "$GITHUB_WORKSPACE/dist/"
          cp "$GITHUB_WORKSPACE/keys/mrep1c-openwrt-multiwan-opkg.pub" "$GITHUB_WORKSPACE/dist/"

          ipk_count="$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -type f -name "*.ipk" | wc -l)"
          test "$ipk_count" -ge 4
          test -s "$GITHUB_WORKSPACE/dist/Packages"
          test -s "$GITHUB_WORKSPACE/dist/Packages.gz"
          test -s "$GITHUB_WORKSPACE/dist/Packages.sig"
          test -s "$GITHUB_WORKSPACE/dist/mrep1c-openwrt-multiwan-opkg.pub"

          {
            echo "OpenWrt ${{ matrix.openwrt_release }} architecture-independent OPKG feed"
            echo
            echo "Install the feed public key first:"
            echo "uclient-fetch -O /tmp/mrep1c-openwrt-multiwan-opkg.pub https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ matrix.release_tag }}/mrep1c-openwrt-multiwan-opkg.pub"
            echo "opkg-key add /tmp/mrep1c-openwrt-multiwan-opkg.pub"
            echo
            echo "Router OPKG feed URL:"
            echo "src/gz multiwan https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ matrix.release_tag }}"
            echo
            echo "Packages:"
            find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -type f -name "*.ipk" -printf "- %f\n" | sort
          } > "$GITHUB_WORKSPACE/dist/RELEASE_NOTES.txt"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-opkg-feed-${{ matrix.openwrt_release }}-${{ matrix.target }}-${{ matrix.subtarget }}
          path: dist/*

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.release_tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --notes-file dist/RELEASE_NOTES.txt
            gh release upload "$TAG" dist/*.ipk dist/Packages dist/Packages.gz dist/Packages.sig dist/mrep1c-openwrt-multiwan-opkg.pub --clobber
            [ -f dist/Packages.manifest ] && gh release upload "$TAG" dist/Packages.manifest --clobber || true
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "OpenWrt ${{ matrix.openwrt_release }} architecture-independent OPKG feed" \
              --notes-file dist/RELEASE_NOTES.txt
            gh release upload "$TAG" dist/*.ipk dist/Packages dist/Packages.gz dist/Packages.sig dist/mrep1c-openwrt-multiwan-opkg.pub --clobber
            [ -f dist/Packages.manifest ] && gh release upload "$TAG" dist/Packages.manifest --clobber || true
          fi
